    // =================================================================

    const SC = {
      green: { bg: "rgba(46,160,67,0.07)", border: "#2EA043", text: "#7EE787" },
      amber: { bg: "rgba(227,179,65,0.07)", border: "#E3B341", text: "#E3B341" },
      red: { bg: "rgba(248,81,73,0.07)", border: "#F85149", text: "#F85149" },
      done: { bg: "rgba(46,160,67,0.04)", border: "#2EA043", text: "#2EA043" },

      review: { bg: "rgba(240,136,62,0.06)", border: "#F0883E", text: "#F0883E" },
    };
    const TC = { 1: "#58A6FF", 2: "#7EE787", 3: "#F0883E" };
    const TL = { 1: "Read-only", 2: "Act & log", 3: "Needs approval" };
    const SB = { bg: "#3F0E40", active: "#1164A3", text: "#fff", muted: "rgba(255,255,255,0.7)", dim: "rgba(255,255,255,0.4)", border: "rgba(255,255,255,0.1)", badge: "#CD2553" };

    // =================================================================
    // SMALL COMPONENTS
    // =================================================================
    function Dot({ status, size = 7 }) {
      const c = SC[status] || SC.green;
      return <div style={{ width: size, height: size, borderRadius: "50%", background: c.border, flexShrink: 0 }} />;
    }

    function TierBadge({ tier }) {
      if (!tier) return null;
      return (
        <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4, fontFamily: "'IBM Plex Mono', monospace", background: `${TC[tier]}12`, border: `1px solid ${TC[tier]}33`, color: TC[tier], flexShrink: 0 }}>
          T{tier} <span style={{ fontWeight: 400, color: "#9B9C9E", fontSize: 9 }}>{TL[tier]}</span>
        </span>
      );
    }

    // Action buttons — the warm handoff links
    function ActionButtons({ actions }) {
      if (!actions || actions.length === 0) return null;
      return (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
          {actions.map((a, i) => (
            <div key={i} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, background: i === 0 ? "rgba(88,166,255,0.12)" : "rgba(255,255,255,0.04)", color: i === 0 ? "#58A6FF" : "#9B9C9E", cursor: "pointer", fontWeight: i === 0 ? 500 : 400, display: "flex", alignItems: "center", gap: 4 }}>
              {a.label} <span style={{ fontSize: 9, opacity: 0.6 }}>→ {a.link}</span>
            </div>
          ))}
        </div>
      );
    }

    // Expandable detail row with accordion
    function Row({ item }) {
      const [open, setOpen] = useState(false);
      const c = SC[item.status] || SC.green;
      const hasExpanded = item.expandedDetail || item.sourceLink || item.actions;
      return (
        <div style={{ borderRadius: 5, overflow: "hidden" }}>
          <div onClick={() => hasExpanded && setOpen(!open)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 12px", background: c.bg, gap: 12, cursor: hasExpanded ? "pointer" : "default" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
              <Dot status={item.status} size={6} />
              <span style={{ fontSize: 13, fontWeight: 500, color: "#C9D1D9", whiteSpace: "nowrap" }}>{item.label}</span>
              {item.role && <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 3, background: "rgba(255,255,255,0.06)", color: "#9B9C9E" }}>{item.role}</span>}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 1, minWidth: 0 }}>
              <span style={{ fontSize: 12, color: "#9B9C9E", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.value}</span>
              {item.tier && <TierBadge tier={item.tier} />}
              {item.age && <span style={{ fontSize: 10, color: c.text, fontFamily: "'IBM Plex Mono', monospace", flexShrink: 0 }}>{item.age}</span>}
              {item.date && <span style={{ fontSize: 11, color: "#484F58", fontFamily: "'IBM Plex Mono', monospace", flexShrink: 0 }}>{item.date}</span>}
              {hasExpanded && <span style={{ fontSize: 9, color: "#484F58", flexShrink: 0, transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.12s" }}>▼</span>}
            </div>
          </div>
          {open && hasExpanded && (
            <div style={{ padding: "8px 12px 10px 30px", background: "rgba(255,255,255,0.02)", borderTop: "1px solid rgba(255,255,255,0.04)" }}>
              {item.expandedDetail && <div style={{ fontSize: 12, color: "#8B949E", lineHeight: 1.6, marginBottom: item.sourceLink || item.actions ? 8 : 0 }}>{item.expandedDetail}</div>}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                {item.sourceLink && <div style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, background: "rgba(88,166,255,0.1)", color: "#58A6FF", cursor: "pointer", fontWeight: 500 }}>{item.sourceLink}</div>}
                {item.actions?.map((a, i) => (
                  <div key={i} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 4, background: "rgba(255,255,255,0.04)", color: "#9B9C9E", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                    {a.label} <span style={{ fontSize: 9, opacity: 0.5 }}>→ {a.link}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function Msg({ msg }) {
      const u = msg.from === "user", a = msg.from === "agent";
      const nc = u ? "#58A6FF" : a ? "#D2A8FF" : "#7EE787";
      const nm = u ? "You" : a ? "Agent" : msg.from;
      return (
        <div style={{ display: "flex", gap: 10, alignItems: "flex-start", maxWidth: 720 }}>
          {!u && <div style={{ width: 28, height: 28, borderRadius: 6, flexShrink: 0, marginTop: 2, background: a ? "linear-gradient(135deg, #7B61FF, #58A6FF)" : "#2EA043", display: "flex", alignItems: "center", justifyContent: "center", fontSize: a ? 12 : 11, color: "#fff", fontWeight: 600 }}>{a ? "🤖" : msg.from[0]}</div>}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: nc }}>{nm}</span>
              <span style={{ fontSize: 11, color: "#484F58" }}>{msg.time}</span>
            </div>
            <div style={{ fontSize: 13, color: "#B1BAC4", lineHeight: 1.6, background: u ? "rgba(88,166,255,0.06)" : "rgba(255,255,255,0.02)", border: `1px solid ${u ? "rgba(88,166,255,0.1)" : "rgba(255,255,255,0.04)"}`, borderRadius: 8, padding: "8px 12px", whiteSpace: "pre-wrap" }}>
              {msg.text}
              {msg.tier && <div style={{ marginTop: 6 }}><TierBadge tier={msg.tier} /></div>}
              {msg.actions && <ActionButtons actions={msg.actions} />}
            </div>
          </div>
        </div>
      );
    }

    function Pill({ card, isChatTarget, onExpand, onChat }) {
      const ur = card.threads.reduce((s, t) => s + t.unread, 0);
      return (
        <div onClick={onExpand} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 6, cursor: "pointer", background: isChatTarget ? "rgba(88,166,255,0.06)" : "rgba(255,255,255,0.02)", border: `1px solid ${isChatTarget ? "rgba(88,166,255,0.15)" : "rgba(255,255,255,0.05)"}` }}>
          <span style={{ fontSize: 12 }}>{card.icon}</span>
          <span style={{ fontSize: 12, fontWeight: 500, color: "#9B9C9E" }}>{card.label}</span>
          <Dot status={card.summary.status} size={6} />
          <div onClick={e => { e.stopPropagation(); onChat(); }} style={{ fontSize: 10, padding: "1px 6px", borderRadius: 4, background: "rgba(255,255,255,0.04)", color: "#6E7681", cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>
            💬{ur > 0 && <span style={{ fontSize: 9, color: "#58A6FF", fontWeight: 700 }}>{ur}</span>}
          </div>
        </div>
      );
    }

    // =================================================================
    // SIDEBAR
    // =================================================================
    function SBItem({ icon, label, active, badge, indent, muted, onClick }) {
      return (
        <div onClick={onClick} style={{ padding: `3px 16px 3px ${indent ? "28px" : "16px"}`, display: "flex", alignItems: "center", gap: 7, cursor: "pointer", borderRadius: 6, margin: "0 8px 1px", background: active ? SB.active : "transparent", color: active ? SB.text : muted ? SB.dim : SB.muted, fontSize: 14, fontWeight: active ? 600 : 400 }}>
          {icon && <span style={{ fontSize: 13, width: 18, textAlign: "center", flexShrink: 0, opacity: muted ? 0.5 : 0.8 }}>{icon}</span>}
          <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
          {badge && <span style={{ fontSize: 11, padding: "0 6px", borderRadius: 8, background: SB.badge, color: "#fff", fontWeight: 700, lineHeight: "18px" }}>{badge}</span>}
        </div>
      );
    }

    function SBSection({ label, badge, open: defaultOpen, children }) {
      const [open, setOpen] = useState(defaultOpen || false);
      return (
        <div style={{ marginTop: 8 }}>
          <div onClick={() => setOpen(!open)} style={{ padding: "4px 16px", display: "flex", alignItems: "center", gap: 6, cursor: "pointer", color: SB.muted, fontSize: 14 }}>
            <span style={{ fontSize: 10, transition: "transform 0.15s", transform: open ? "rotate(90deg)" : "rotate(0)" }}>▶</span>
            <span style={{ flex: 1, fontWeight: 500 }}>{label}</span>
            {badge && <span style={{ fontSize: 11, padding: "0 6px", borderRadius: 8, background: SB.badge, color: "#fff", fontWeight: 700, lineHeight: "18px" }}>{badge}</span>}
          </div>
          {open && <div style={{ marginTop: 2 }}>{children}</div>}
        </div>
      );
    }

    function Sidebar({ activePage, onPageSelect }) {
      return (
        <div style={{ display: "flex", flexShrink: 0, height: "100%" }}>
          <div style={{ width: 60, background: "#2C0A2E", display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 0", gap: 2, flexShrink: 0 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: "linear-gradient(135deg, #667eea, #764ba2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, marginBottom: 10 }}>🚀</div>
            {[{ icon: "🏠", label: "Home" }, { icon: "💬", label: "DMs" }, { icon: "🔔", label: "Activity" }, { icon: "🔗", label: "External" }, { icon: "🕐", label: "Later" }, { icon: "···", label: "More" }].map((item, i) => (
              <div key={i} style={{ width: 44, padding: "6px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, cursor: "pointer", borderRadius: 8, color: "rgba(255,255,255,0.6)", fontSize: 18 }}>
                <span>{item.icon}</span>
                <span style={{ fontSize: 9, color: "rgba(255,255,255,0.5)" }}>{item.label}</span>
              </div>
            ))}
            <div style={{ flex: 1 }} />
            <div style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, cursor: "pointer", marginBottom: 4 }}>+</div>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "#E3B341", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: "#1A1D21" }}>JB</div>
          </div>
          <div style={{ width: 240, background: SB.bg, display: "flex", flexDirection: "column", borderRight: `1px solid ${SB.border}`, overflow: "hidden" }}>
            <div style={{ padding: "12px 16px 4px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ fontSize: 16, fontWeight: 700, color: SB.text }}>ACME Inc</span><span style={{ fontSize: 12, color: SB.dim }}>▾</span></div>
              <div style={{ display: "flex", gap: 8 }}><span style={{ fontSize: 14, color: SB.dim, cursor: "pointer" }}>☰</span><span style={{ fontSize: 14, color: SB.dim, cursor: "pointer" }}>✎</span></div>
            </div>
            <div style={{ padding: "4px 16px 8px" }}>
              <div style={{ padding: "4px 10px", borderRadius: 6, background: "rgba(255,255,255,0.06)", fontSize: 13, color: SB.muted, display: "flex", alignItems: "center", gap: 6 }}>All workspaces <span style={{ marginLeft: "auto", fontSize: 10, color: SB.dim }}>▾</span></div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", paddingBottom: 12 }}>
              <SBItem icon="💬" label="Unreads" />
              <SBItem icon="🧵" label="Threads" badge="1" />
              <SBItem icon="📤" label="Drafts & sent" />
              <div style={{ height: 1, background: SB.border, margin: "8px 16px" }} />
              <div style={{ padding: "4px 16px 2px", display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 22, height: 22, borderRadius: 6, background: "linear-gradient(135deg, #1164A3, #7B61FF)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>🚀</div>
                <span style={{ fontSize: 14, fontWeight: 700, color: SB.text }}>Acme Project Alpha</span>
              </div>
              <div style={{ marginTop: 4 }}>
                {PAGE_LIST.map(pg => (
                  <SBItem key={pg.id} icon={pg.icon} label={pg.label} active={activePage === pg.id} indent onClick={() => onPageSelect(pg.id)} />
                ))}
              </div>
              <div style={{ height: 1, background: SB.border, margin: "8px 16px" }} />
              <SBSection label="Starred" open={true}>
                <SBItem icon="#" label="acme-proj-alpha" indent />
                <SBItem icon="#" label="acme-proj-alpha-sa" indent />
                <SBItem icon="🔒" label="acme-proj-alpha-leader" indent />
              </SBSection>
              <SBSection label="Channels" badge="4">
                <SBItem icon="#" label="general" indent muted />
                <SBItem icon="#" label="acme-crm-data" indent />
                <SBItem icon="#" label="acme-external" indent />
              </SBSection>
              <SBSection label="Direct messages" badge="4">
                <SBItem icon="🟢" label="Lisa Park" indent />
                <SBItem icon="🟢" label="Raj Patel" indent />
                <SBItem icon="⚪" label="Sarah Kim" indent muted />
              </SBSection>
              <SBSection label="Apps" open={true}>
                <SBItem icon="📅" label="Google Calendar" indent />
                <SBItem icon="📝" label="Quip" indent />
              </SBSection>
            </div>
          </div>
        </div>
      );
    }

    // =================================================================
    // MAIN APP
    // =================================================================
    function App() {
      const [activePage, setActivePage] = useState("overview");
      const [expanded, setExpanded] = useState(null);
      const [chatId, setChatId] = useState(null);
      const [chatOpen, setChatOpen] = useState(false);
      const [threadTabs, setThreadTabs] = useState({});

      const pageData = PAGES_DATA[activePage];
      const cards = pageData?.cards || [];

      const switchPage = (pgId) => { setActivePage(pgId); setExpanded(null); const fc = PAGES_DATA[pgId]?.cards?.[0]; if (fc) { setChatId(fc.id); setChatOpen(true); } };
      const toggle = id => setExpanded(expanded === id ? null : id);
      const openChat = id => { setChatId(id); setChatOpen(true); };

      const cd = cards.find(c => c.id === chatId);
      const activeTabId = threadTabs[chatId] || cd?.threads?.[0]?.id;
      const at = cd?.threads?.find(t => t.id === activeTabId);
      const setTab = (cid, tid) => setThreadTabs({ ...threadTabs, [cid]: tid });

      return (
        <div style={{ fontFamily: "'Inter', -apple-system, sans-serif", background: "#1A1D21", color: "#D1D2D3", height: "100vh", display: "flex", overflow: "hidden" }}>
          <Sidebar activePage={activePage} onPageSelect={switchPage} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            <div style={{ padding: "10px 24px", borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
              <span style={{ fontSize: 16 }}>{pageData?.icon}</span>
              <span style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{pageData?.label}</span>
              <span style={{ fontSize: 12, color: "#9B9C9E", padding: "3px 10px", borderRadius: 4, background: "rgba(255,255,255,0.06)" }}>{pageData?.headerDetail}</span>
            </div>

            {/* Top: cards */}
            <div style={{ flex: chatOpen ? "0 0 auto" : 1, maxHeight: chatOpen ? "48%" : "100%", overflowY: "auto", padding: "12px 24px", transition: "all 0.2s ease" }}>
              <div style={{ display: "grid", gridTemplateColumns: expanded ? "1fr" : "repeat(auto-fill, minmax(320px, 1fr))", gap: 6 }}>
                {cards.map(card => {
                  const isExp = expanded === card.id;
                  const isChat = chatId === card.id && chatOpen;
                  const sc = SC[card.summary.status] || SC.green;
                  const ur = card.threads.reduce((s, t) => s + t.unread, 0);

                  if (expanded && !isExp) return <Pill key={card.id} card={card} isChatTarget={isChat} onExpand={() => toggle(card.id)} onChat={() => openChat(card.id)} />;

                  return (
                    <div key={card.id} style={{ background: isChat ? "rgba(88,166,255,0.03)" : "rgba(255,255,255,0.02)", border: `1px solid ${isChat ? "rgba(88,166,255,0.15)" : "rgba(255,255,255,0.06)"}`, borderRadius: 8, gridColumn: isExp ? "1 / -1" : "auto" }}>
                      <div style={{ padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div onClick={() => toggle(card.id)} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flex: 1, minWidth: 0 }}>
                          <span style={{ fontSize: 14 }}>{card.icon}</span>
                          <span style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{card.label}</span>
                          <span style={{ fontSize: 13, color: "#6E7681", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{card.summary.main}</span>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: "auto" }}>
                            {card.summary.metric && <span style={{ fontSize: 14, fontWeight: 700, color: sc.text, fontFamily: "'IBM Plex Mono', monospace" }}>{card.summary.metric}</span>}
                            <Dot status={card.summary.status} size={8} />
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: 12, flexShrink: 0 }}>
                          <div onClick={() => openChat(card.id)} style={{ fontSize: 11, padding: "4px 10px", borderRadius: 5, background: isChat ? "rgba(88,166,255,0.15)" : "rgba(255,255,255,0.04)", color: isChat ? "#58A6FF" : "#6E7681", cursor: "pointer", fontWeight: 500, display: "flex", alignItems: "center", gap: 5 }}>
                            💬{ur > 0 && <span style={{ fontSize: 9, padding: "0 5px", borderRadius: 8, background: "#58A6FF", color: "#fff", fontWeight: 700, marginLeft: 2 }}>{ur}</span>}
                          </div>
                          <span onClick={() => toggle(card.id)} style={{ fontSize: 10, color: "#484F58", cursor: "pointer", padding: "4px 6px" }}>{isExp ? "▲" : "▼"}</span>
                        </div>
                      </div>
                      {isExp && (
                        <div style={{ padding: "0 14px 12px", borderTop: "1px solid rgba(255,255,255,0.04)" }}>
                          <div style={{ display: "flex", flexDirection: "column", gap: 3, paddingTop: 8 }}>
                            {card.detail.map((item, j) => <Row key={j} item={item} />)}
                          </div>
                          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                            {card.sources?.filter(s => s !== "AI Generated" && s !== "Open AI Log").map((s, si) => (
                              <div key={si} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 5, background: si === 0 ? "rgba(88,166,255,0.1)" : "rgba(255,255,255,0.04)", color: si === 0 ? "#58A6FF" : "#9B9C9E", cursor: "pointer", fontWeight: si === 0 ? 500 : 400 }}>Open in {s} →</div>
                            ))}
                            <div onClick={() => openChat(card.id)} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 5, background: "rgba(255,255,255,0.04)", color: "#9B9C9E", cursor: "pointer" }}>💬 Ask Agent</div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Bottom: chat */}
            {chatOpen && cd && (
              <div style={{ flex: 1, minHeight: 0, borderTop: "2px solid rgba(88,166,255,0.15)", display: "flex", flexDirection: "column", background: "rgba(0,0,0,0.1)" }}>
                <div style={{ flexShrink: 0, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ padding: "8px 24px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 14 }}>{cd.icon}</span><span style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{cd.label}</span></div>
                    <span onClick={() => setChatOpen(false)} style={{ fontSize: 11, color: "#6E7681", cursor: "pointer", padding: "3px 8px", borderRadius: 4, background: "rgba(255,255,255,0.04)" }}>▼ Minimize</span>
                  </div>
                  <div style={{ display: "flex", gap: 0, padding: "6px 24px 0" }}>
                    {cd.threads.map(t => {
                      const act = activeTabId === t.id;
                      return (
                        <div key={t.id} onClick={() => setTab(chatId, t.id)} style={{ padding: "6px 14px 8px", fontSize: 13, fontWeight: act ? 600 : 400, color: act ? "#fff" : "#9B9C9E", borderBottom: `2px solid ${act ? "#58A6FF" : "transparent"}`, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 12 }}>{t.icon}</span>{t.label}
                          {t.unread > 0 && <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 8, background: "#58A6FF", color: "#fff", fontWeight: 700 }}>{t.unread}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{ flex: 1, overflowY: "auto", padding: "10px 24px", display: "flex", flexDirection: "column", gap: 8 }}>
                  {at?.messages.map((msg, i) => <Msg key={i} msg={msg} />)}
                </div>
                <div style={{ padding: "10px 24px", borderTop: "1px solid rgba(255,255,255,0.06)", flexShrink: 0 }}>
                  <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", maxWidth: 720 }}>
                    <span style={{ fontSize: 13, color: "#6E7681" }}>Message about {cd.label.toLowerCase()}...</span>
                    <span style={{ fontSize: 16, cursor: "pointer", color: "#58A6FF" }}>↑</span>
                  </div>
                </div>
              </div>
            )}

            {!chatOpen && cd && (
              <div onClick={() => setChatOpen(true)} style={{ padding: "10px 24px", borderTop: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", background: "rgba(88,166,255,0.03)", flexShrink: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 14 }}>{cd.icon}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#C9D1D9" }}>{cd.label}</span>
                  <span style={{ fontSize: 12, color: "#6E7681" }}>— {at?.messages[at.messages.length - 1]?.text.slice(0, 80)}...</span>
                </div>
                <span style={{ fontSize: 11, color: "#58A6FF", fontWeight: 500 }}>▲ Expand</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
