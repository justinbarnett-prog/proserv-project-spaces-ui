    function Dot({ status, size = 7, theme }) {

    function Row({ item, t }) {

    function SettingsPanel({ config, setConfig, isDark, setIsDark, onClose, t }) {

          <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px" }}>
            {/* Theme toggle */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: t.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>Appearance</div>
              <div onClick={() => setIsDark(!isDark)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderRadius: 6, background: t.bgCard, border: `1px solid ${t.border}`, cursor: "pointer" }}>
                <span style={{ fontSize: 14, color: t.text }}>{isDark ? "🌙 Dark Mode" : "☀️ Light Mode"}</span>
                <div style={{ width: 40, height: 22, borderRadius: 11, background: isDark ? t.accent : "#ccc", position: "relative", transition: "background 0.2s" }}>
                  <div style={{ width: 18, height: 18, borderRadius: 9, background: "#fff", position: "absolute", top: 2, left: isDark ? 20 : 2, transition: "left 0.2s" }} />

              {PAGE_LIST.map(pg => (
                <div key={pg.id} onClick={() => setConfig({ ...config, hiddenPages: config.hiddenPages?.includes(pg.id) ? config.hiddenPages.filter(p => p !== pg.id) : [...(config.hiddenPages || []), pg.id] })} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 14px", borderRadius: 6, background: t.bgCard, border: `1px solid ${t.border}`, cursor: "pointer", marginBottom: 4 }}>

    // =================================================================
    // MAIN APP
    // =================================================================
    function App() {
      const [isDark, setIsDark] = useState(true);
      const [config, setConfig] = useState({ hiddenPages: [], hiddenCards: [] });
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [activePage, setActivePage] = useState("overview");
      const [expanded, setExpanded] = useState(null);
      const [chatId, setChatId] = useState(null);
      const [chatOpen, setChatOpen] = useState(false);
      const [threadTabs, setThreadTabs] = useState({});
      const [myTasks, setMyTasks] = useState(false);

      // Demo chat state
      const [demoIndex, setDemoIndex] = useState({}); // per-thread: how many messages visible
      const [inputText, setInputText] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      const t = isDark ? THEMES.dark : THEMES.light;
      const pageData = PAGES_DATA[activePage];
      const visiblePages = PAGE_LIST.filter(p => !config.hiddenPages?.includes(p.id));
      const allCards = pageData?.cards || [];
      const cards = allCards.filter(c => !config.hiddenCards?.includes(`${activePage}:${c.id}`));

      const switchPage = (pgId) => { setActivePage(pgId); setExpanded(null); setMyTasks(false); const fc = PAGES_DATA[pgId]?.cards?.[0]; if (fc) { setChatId(fc.id); setChatOpen(true); } };
      const toggle = id => setExpanded(expanded === id ? null : id);
      const openChat = id => { setChatId(id); setChatOpen(true); };

      const cd = cards.find(c => c.id === chatId) || allCards.find(c => c.id === chatId);
      const activeTabId = threadTabs[chatId] || cd?.threads?.[0]?.id;
      const at = cd?.threads?.find(th => th.id === activeTabId);
      const setTab = (cid, tid) => setThreadTabs({ ...threadTabs, [cid]: tid });

      // Demo: how many messages to show for current thread
      const demoKey = activeTabId || "";
      const visibleMsgCount = demoIndex[demoKey] ?? 0;
      const allMsgs = at?.messages || [];
      const visibleMsgs = allMsgs.slice(0, visibleMsgCount);
      const nextMsg = allMsgs[visibleMsgCount];
      const demoComplete = visibleMsgCount >= allMsgs.length;

      // Initialize demo for new threads — show opening agent messages automatically
      useEffect(() => {
        if (demoKey && demoIndex[demoKey] === undefined) {
          let startCount = 0;
          while (startCount < allMsgs.length && allMsgs[startCount]?.from !== "user") {
            startCount++;
          }
          setDemoIndex(prev => ({ ...prev, [demoKey]: startCount }));
        }
      }, [demoKey]);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [visibleMsgCount, isTyping]);

      // Click input: load next user message text (or agent auto-sends)
      const handleInputClick = () => {
        if (demoComplete || isTyping) return;
        if (nextMsg?.from === "user") {
          setInputText(nextMsg.text);
        } else {
          // Auto-reveal non-user messages
          revealNext();
        }
      };

      const revealNext = () => {
        setDemoIndex(prev => ({ ...prev, [demoKey]: (prev[demoKey] || 0) + 1 }));
        // Check if the NEXT message after this one is also non-user (chain agent messages)
        const nextIdx = (demoIndex[demoKey] || 0) + 1;
        if (nextIdx < allMsgs.length && allMsgs[nextIdx]?.from !== "user") {
          setIsTyping(true);
          setTimeout(() => { setIsTyping(false); setDemoIndex(prev => ({ ...prev, [demoKey]: (prev[demoKey] || 0) + 1 })); }, 1200);
        }
      };

      const handleSend = () => {
        if (!inputText || isTyping) return;
        setInputText("");
        setDemoIndex(prev => ({ ...prev, [demoKey]: (prev[demoKey] || 0) + 1 }));
        // After user sends, auto-reveal agent response(s) with delay
        const nextIdx = (demoIndex[demoKey] || 0) + 1;
        if (nextIdx < allMsgs.length && allMsgs[nextIdx]?.from !== "user") {
          setIsTyping(true);
          const revealChain = (idx) => {
            setTimeout(() => {
              setIsTyping(false);
              setDemoIndex(prev => ({ ...prev, [demoKey]: idx + 1 }));
              // Chain if next is also agent
              if (idx + 1 < allMsgs.length && allMsgs[idx + 1]?.from !== "user") {
                setIsTyping(true);
                revealChain(idx + 1);
              }
            }, 1200);
          };
          revealChain(nextIdx);
        }
      };

      // My Tasks filter
      const filterForUser = (detail) => {
        if (!myTasks) return detail;
        return detail.filter(d => d.label?.includes(CURRENT_USER) || d.value?.includes(CURRENT_USER));
      };

      return (
        <div style={{ fontFamily: "'Inter', -apple-system, sans-serif", background: t.bg, color: t.text, height: "100vh", display: "flex", overflow: "hidden" }}>

          {/* Sidebar */}
          <div style={{ display: "flex", flexShrink: 0, height: "100%" }}>
            <div style={{ width: 60, background: t.sbRail, display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 0", gap: 2, flexShrink: 0 }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: "linear-gradient(135deg, #667eea, #764ba2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, marginBottom: 10 }}>🚀</div>
              {[{ icon: "🏠", label: "Home" }, { icon: "💬", label: "DMs" }, { icon: "🔔", label: "Activity" }, { icon: "🔗", label: "External" }, { icon: "🕐", label: "Later" }, { icon: "···", label: "More" }].map((item, i) => (
                <div key={i} style={{ width: 44, padding: "6px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, cursor: "pointer", borderRadius: 8, color: "rgba(255,255,255,0.6)", fontSize: 18 }}>
                  <span>{item.icon}</span><span style={{ fontSize: 9, color: "rgba(255,255,255,0.5)" }}>{item.label}</span>
                </div>
              ))}
              <div style={{ flex: 1 }} />
              <div style={{ width: 32, height: 32, borderRadius: 8, background: "#E3B341", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: "#1A1D21" }}>MC</div>
            </div>
            <div style={{ width: 240, background: t.sbBg, display: "flex", flexDirection: "column", borderRight: `1px solid ${t.sbBorder}`, overflow: "hidden" }}>
              <div style={{ padding: "12px 16px 4px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: t.sbText }}>ACME Inc ▾</span>
                <span onClick={() => setSettingsOpen(true)} style={{ fontSize: 14, color: t.sbDim, cursor: "pointer" }}>⚙️</span>
              </div>
              <div style={{ padding: "4px 16px 8px" }}>
                <div style={{ padding: "4px 10px", borderRadius: 6, background: "rgba(255,255,255,0.06)", fontSize: 13, color: t.sbMuted }}>All workspaces ▾</div>
              </div>
              <div style={{ flex: 1, overflowY: "auto", paddingBottom: 12 }}>
                <SBItem icon="💬" label="Unreads" t={t} />
                <SBItem icon="🧵" label="Threads" badge="1" t={t} />
                <SBItem icon="📤" label="Drafts & sent" t={t} />
                <div style={{ height: 1, background: t.sbBorder, margin: "8px 16px" }} />
                <div style={{ padding: "4px 16px 2px", display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, background: "linear-gradient(135deg, #1164A3, #7B61FF)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>🚀</div>
                  <span style={{ fontSize: 14, fontWeight: 700, color: t.sbText }}>Acme Project Alpha</span>
                </div>
                <div style={{ marginTop: 4 }}>
                  {visiblePages.map(pg => (
                    <SBItem key={pg.id} icon={pg.icon} label={pg.label} active={activePage === pg.id} indent onClick={() => switchPage(pg.id)} t={t} />
                  ))}
                </div>
                <div style={{ height: 1, background: t.sbBorder, margin: "8px 16px" }} />
                <SBSection label="Starred" open={true} t={t}>
                  <SBItem icon="#" label="acme-proj-alpha" indent t={t} />
                  <SBItem icon="#" label="acme-proj-alpha-sa" indent t={t} />
                </SBSection>
                <SBSection label="Channels" badge="4" t={t}>
                  <SBItem icon="#" label="acme-crm-data" indent t={t} />
                  <SBItem icon="#" label="acme-external" indent t={t} />
                </SBSection>
                <SBSection label="Direct messages" badge="4" t={t}>
                  <SBItem icon="🟢" label="Lisa Park" indent t={t} />
                  <SBItem icon="🟢" label="Raj Patel" indent t={t} />
                </SBSection>
                <SBSection label="Apps" open={true} t={t}>
                  <SBItem icon="📅" label="Google Calendar" indent t={t} />
                  <SBItem icon="📝" label="Quip" indent t={t} />
                </SBSection>
              </div>
            </div>
          </div>

          {/* Main */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            {/* Header */}
            <div style={{ padding: "10px 24px", borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, background: t.headerBg }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16 }}>{pageData?.icon}</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: t.text }}>{pageData?.label}</span>
                <span style={{ fontSize: 12, color: t.textMuted, padding: "3px 10px", borderRadius: 4, background: t.bgInput }}>{pageData?.headerDetail}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {/* My Tasks toggle */}
                <div onClick={() => setMyTasks(!myTasks)} style={{ fontSize: 12, padding: "4px 12px", borderRadius: 5, background: myTasks ? t.accentBg : t.bgInput, color: myTasks ? t.accent : t.textMuted, cursor: "pointer", fontWeight: myTasks ? 600 : 400, border: `1px solid ${myTasks ? t.accent + "44" : "transparent"}` }}>
                  {myTasks ? `👤 ${CURRENT_USER}` : "👤 My Tasks"}
                </div>
                <div onClick={() => setSettingsOpen(true)} style={{ fontSize: 12, padding: "4px 12px", borderRadius: 5, background: t.bgInput, color: t.textMuted, cursor: "pointer" }}>⚙️</div>
              </div>
            </div>

            {/* Top: cards */}
            <div style={{ flex: chatOpen ? "0 0 auto" : 1, maxHeight: chatOpen ? "48%" : "100%", overflowY: "auto", padding: "12px 24px" }}>
              <div style={{ display: "grid", gridTemplateColumns: expanded ? "1fr" : "repeat(auto-fill, minmax(320px, 1fr))", gap: 6 }}>
                {cards.map(card => {
                  const isExp = expanded === card.id;
                  const isChat = chatId === card.id && chatOpen;
                  const sc = STATUS_COLORS[card.summary.status] || STATUS_COLORS.green;
                  const ur = card.threads.reduce((s, th) => s + th.unread, 0);
                  const filteredDetail = filterForUser(card.detail);

                  // Hide cards with no items when My Tasks is on
                  if (myTasks && filteredDetail.length === 0 && !isExp) return null;

                  if (expanded && !isExp) return <Pill key={card.id} card={card} isChat={isChat} onExpand={() => toggle(card.id)} onChat={() => openChat(card.id)} t={t} />;

                  return (
                    <div key={card.id} style={{ background: isChat ? t.bgCardHover : t.bgCard, border: `1px solid ${isChat ? t.borderActive : t.border}`, borderRadius: 8, gridColumn: isExp ? "1 / -1" : "auto" }}>
                      <div style={{ padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div onClick={() => toggle(card.id)} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flex: 1, minWidth: 0 }}>
                          <span style={{ fontSize: 14 }}>{card.icon}</span>
                          <span style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{card.label}</span>
                          <span style={{ fontSize: 13, color: t.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{myTasks ? `${filteredDetail.length} items` : card.summary.main}</span>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: "auto" }}>
                            {card.summary.metric && <span style={{ fontSize: 14, fontWeight: 700, color: sc.border, fontFamily: "'IBM Plex Mono', monospace" }}>{card.summary.metric}</span>}
                            <Dot status={card.summary.status} size={8} />
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: 12, flexShrink: 0 }}>
                          <div onClick={() => openChat(card.id)} style={{ fontSize: 11, padding: "4px 10px", borderRadius: 5, background: isChat ? t.accentBg : t.bgInput, color: isChat ? t.accent : t.textDim, cursor: "pointer", fontWeight: 500, display: "flex", alignItems: "center", gap: 5 }}>
                            💬{ur > 0 && <span style={{ fontSize: 9, padding: "0 5px", borderRadius: 8, background: t.accent, color: "#fff", fontWeight: 700, marginLeft: 2 }}>{ur}</span>}
                          </div>
                          <span onClick={() => toggle(card.id)} style={{ fontSize: 10, color: t.textDim, cursor: "pointer", padding: "4px 6px" }}>{isExp ? "▲" : "▼"}</span>
                        </div>
                      </div>
                      {isExp && (
                        <div style={{ padding: "0 14px 12px", borderTop: `1px solid ${t.border}` }}>
                          <div style={{ display: "flex", flexDirection: "column", gap: 3, paddingTop: 8 }}>
                            {filteredDetail.map((item, j) => <Row key={j} item={item} t={t} />)}
                            {myTasks && filteredDetail.length === 0 && <div style={{ fontSize: 13, color: t.textDim, padding: "12px", textAlign: "center" }}>No items assigned to {CURRENT_USER}</div>}
                          </div>
                          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                            {card.sources?.filter(s => s !== "AI Generated" && s !== "Open AI Log").map((s, si) => (
                              <div key={si} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 5, background: si === 0 ? t.accentBg : t.bgInput, color: si === 0 ? t.accent : t.textMuted, cursor: "pointer", fontWeight: si === 0 ? 500 : 400 }}>Open in {s} →</div>
                            ))}
                            <div onClick={() => openChat(card.id)} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 5, background: t.bgInput, color: t.textMuted, cursor: "pointer" }}>💬 Ask Agent</div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Bottom: chat with demo flow */}
            {chatOpen && cd && (
              <div style={{ flex: 1, minHeight: 0, borderTop: `2px solid ${t.borderChat}`, display: "flex", flexDirection: "column", background: t.bgChat }}>
                <div style={{ flexShrink: 0, borderBottom: `1px solid ${t.border}` }}>
                  <div style={{ padding: "8px 24px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 14 }}>{cd.icon}</span><span style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{cd.label}</span></div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      {!demoComplete && <span style={{ fontSize: 10, color: t.accent, fontFamily: "'IBM Plex Mono', monospace" }}>Demo: {visibleMsgCount}/{allMsgs.length}</span>}
                      <span onClick={() => setChatOpen(false)} style={{ fontSize: 11, color: t.textMuted, cursor: "pointer", padding: "3px 8px", borderRadius: 4, background: t.bgInput }}>▼ Minimize</span>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 0, padding: "6px 24px 0" }}>
                    {cd.threads.map(th => {
                      const act = activeTabId === th.id;
                      return (
                        <div key={th.id} onClick={() => setTab(chatId, th.id)} style={{ padding: "6px 14px 8px", fontSize: 13, fontWeight: act ? 600 : 400, color: act ? t.text : t.textMuted, borderBottom: `2px solid ${act ? t.accent : "transparent"}`, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 12 }}>{th.icon}</span>{th.label}
                          {th.unread > 0 && <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 8, background: t.accent, color: "#fff", fontWeight: 700 }}>{th.unread}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{ flex: 1, overflowY: "auto", padding: "10px 24px", display: "flex", flexDirection: "column", gap: 8 }}>
                  {visibleMsgs.map((msg, i) => <Msg key={i} msg={msg} t={t} />)}
                  {isTyping && (
                    <div style={{ display: "flex", gap: 10, alignItems: "center", maxWidth: 720 }}>
                      <div style={{ width: 28, height: 28, borderRadius: 6, background: "linear-gradient(135deg, #7B61FF, #58A6FF)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>🤖</div>
                      <div style={{ fontSize: 13, color: t.textDim, fontStyle: "italic" }}>Agent is typing...</div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
                <div style={{ padding: "10px 24px", borderTop: `1px solid ${t.border}`, flexShrink: 0 }}>
                  <div
                    onClick={!inputText ? handleInputClick : undefined}
                    style={{ background: t.bgInput, border: `1px solid ${inputText ? t.accent + "66" : t.border}`, borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", maxWidth: 720, cursor: !inputText && !demoComplete ? "pointer" : "default" }}
                  >
                    <span style={{ fontSize: 13, color: inputText ? t.text : t.textDim }}>
                      {inputText || (demoComplete ? "Demo complete ✓" : isTyping ? "Waiting for response..." : "Click here to continue the conversation...")}
                    </span>
                    {inputText && (
                      <span onClick={handleSend} style={{ fontSize: 14, cursor: "pointer", color: t.accent, fontWeight: 700, padding: "2px 8px", borderRadius: 4, background: t.accentBg }}>Send ↑</span>
                    )}
                  </div>
                </div>
              </div>
            )}

            {!chatOpen && cd && (
              <div onClick={() => setChatOpen(true)} style={{ padding: "10px 24px", borderTop: `1px solid ${t.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", background: t.bgCardHover, flexShrink: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 14 }}>{cd.icon}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{cd.label}</span>
                </div>
                <span style={{ fontSize: 11, color: t.accent, fontWeight: 500 }}>▲ Expand</span>
              </div>
            )}
          </div>

          {/* Settings overlay */}
          {settingsOpen && <SettingsPanel config={config} setConfig={setConfig} isDark={isDark} setIsDark={setIsDark} onClose={() => setSettingsOpen(false)} t={t} />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
